apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka
spec:
  kafka:
    replicas: 1

    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false

    storage:
      type: ephemeral

  kraft:
    enabled: true

  entityOperator:
    topicOperator: {}
    userOperator: {}