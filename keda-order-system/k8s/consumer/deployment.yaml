apiVersion: apps/v1

kind: Deployment

metadata:

  name: consumer

  namespace: order-system

spec:

  replicas: 0

  selector:

    matchLabels:

      app: consumer

  template:

    metadata:

      labels:

        app: consumer

    spec:

      containers:

      - name: consumer

        image: consumer:1.0

        imagePullPolicy: Never