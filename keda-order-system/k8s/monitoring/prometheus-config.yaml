apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config
  namespace: monitoring

data:

  prometheus.yml: |

    global:
      scrape_interval: 5s

    scrape_configs:

      - job_name: producer

        metrics_path: /actuator/prometheus

        static_configs:
          - targets:
              - producer.order-system.svc.cluster.local:80

      - job_name: consumer

        metrics_path: /actuator/prometheus

        static_configs:
          - targets:
              - consumer.order-system.svc.cluster.local:80