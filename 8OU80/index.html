<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>8 ou 80</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="ranking">
    <h2>MENOR SCORE</h2>
    <ul id="lowScores"></ul>
  </div>

  <div class="game">
    <h1>8 ou 80</h1>

    <div id="selector">3</div>

    <div class="info">
      <p>Tentativa: <span id="attempt">1</span>/3</p>
      <p>Soma: <span id="sum">0</span></p>
    </div>

    <div id="result"></div>
  </div>

  <div class="ranking">
    <h2>MAIOR SCORE</h2>
    <ul id="highScores"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
